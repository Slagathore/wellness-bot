<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Adventures</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #0f1117);
      --sec-bg: var(--tg-theme-secondary-bg-color, #171a21);
      --text: var(--tg-theme-text-color, #e7e3d8);
      --hint: var(--tg-theme-hint-color, #8b91a0);
      --link: var(--tg-theme-link-color, #6ea8fe);
      --btn: var(--tg-theme-button-color, #6d5dfc);
      --btn-text: var(--tg-theme-button-text-color, #ffffff);
      --accent: var(--tg-theme-link-color, #d8a657);
      --border: rgba(139, 145, 160, 0.18);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 15px;
      display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    }
    header {
      padding: 12px 16px; font-weight: 700; font-size: 16px; flex: 0 0 auto;
      border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px;
    }
    header .back { color: var(--link); cursor: pointer; font-weight: 500; display: none; }
    header .title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    header .newbtn { color: var(--link); cursor: pointer; font-weight: 600; font-size: 14px; white-space: nowrap; }
    header .newbtn.hidden { display: none; }
    main { flex: 1 1 auto; overflow-y: auto; }
    .hint { color: var(--hint); }
    .empty { text-align: center; color: var(--hint); padding: 48px 22px; line-height: 1.6; }

    /* ---- Adventure list ---- */
    .list { padding: 12px 14px; }
    .adv {
      background: var(--sec-bg); border: 1px solid var(--border); border-radius: 12px;
      padding: 14px; margin-bottom: 10px; cursor: pointer; transition: transform .05s ease;
    }
    .adv:active { transform: scale(0.99); }
    .adv .t { font-weight: 600; margin-bottom: 5px; }
    .adv .m { color: var(--hint); font-size: 12px; }
    .badge { font-size: 11px; padding: 1px 8px; border-radius: 999px; background: rgba(110,168,254,.14); color: var(--link); text-transform: capitalize; }
    .badge.completed { background: rgba(139,145,160,.14); color: var(--hint); }
    .pager { display: flex; gap: 8px; justify-content: center; align-items: center; margin: 10px 0 4px; }
    .pager button { background: var(--sec-bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; }
    .pager button:disabled { opacity: .4; }

    /* ---- Story (AI-Dungeon style continuous prose) ---- */
    .story {
      padding: 18px 18px 8px; font-family: Georgia, "Iowan Old Style", "Times New Roman", serif;
      font-size: 17px; line-height: 1.72; max-width: 720px; margin: 0 auto;
    }
    .story p { margin: 0 0 2px; white-space: pre-wrap; }
    .story .narrator { color: var(--text); }
    .story .action { color: var(--accent); font-style: italic; }  /* player Do/Say */
    .story .action::before { content: "\203A  "; opacity: .6; font-style: normal; }
    .story .authored { color: var(--text); opacity: .92; }         /* player Story */
    .typing { color: var(--hint); font-style: italic; padding: 4px 2px 10px; }

    /* ---- Composer ---- */
    .dock { flex: 0 0 auto; border-top: 1px solid var(--border); background: var(--bg); padding: 8px 10px calc(8px + env(safe-area-inset-bottom)); }
    .actions { display: flex; gap: 8px; margin-bottom: 8px; }
    .actions button {
      flex: 1; background: transparent; color: var(--hint); border: 1px solid var(--border);
      border-radius: 9px; padding: 7px 4px; font-size: 12.5px; font-weight: 600;
    }
    .actions button:active { background: var(--sec-bg); }
    .actions button:disabled { opacity: .4; }
    .modes { display: flex; gap: 4px; background: var(--sec-bg); border: 1px solid var(--border); border-radius: 10px; padding: 3px; margin-bottom: 8px; }
    .modes button { flex: 1; background: transparent; color: var(--hint); border: none; border-radius: 7px; padding: 7px 4px; font-weight: 600; font-size: 13px; }
    .modes button.on { background: var(--btn); color: var(--btn-text); }
    .composer { display: flex; gap: 8px; align-items: flex-end; }
    .composer textarea {
      flex: 1; resize: none; border: 1px solid var(--border); border-radius: 16px;
      padding: 10px 14px; background: var(--sec-bg); color: var(--text); font: inherit; max-height: 120px;
    }
    .composer button {
      border: none; border-radius: 16px; background: var(--btn); color: var(--btn-text);
      padding: 0 18px; height: 42px; font-weight: 600; min-width: 66px;
    }
    .composer button:disabled { opacity: .5; }
    .hidden { display: none !important; }

    /* ---- Create form ---- */
    .create { padding: 16px 16px 28px; max-width: 560px; margin: 0 auto; }
    .create label { display: block; font-size: 12.5px; color: var(--hint); font-weight: 600; margin: 14px 2px 6px; text-transform: uppercase; letter-spacing: .3px; }
    .create input, .create textarea {
      width: 100%; border: 1px solid var(--border); border-radius: 11px; background: var(--sec-bg);
      color: var(--text); font: inherit; padding: 11px 13px; resize: vertical;
    }
    .create .go {
      width: 100%; margin-top: 20px; border: none; border-radius: 13px; background: var(--btn);
      color: var(--btn-text); font-weight: 700; font-size: 15px; padding: 13px; cursor: pointer;
    }
    .create .go:disabled { opacity: .55; }
    .create .status { margin-top: 12px; text-align: center; color: var(--hint); font-size: 13px; min-height: 18px; }
  </style>
</head>
<body>
  <header>
    <span class="back" id="back">‹ Back</span>
    <span class="title" id="title">Your Adventures</span>
    <span class="newbtn" id="newbtn">＋ New</span>
  </header>
  <main id="main"><div class="empty">Loading…</div></main>

  <div class="dock hidden" id="dock">
    <div class="actions">
      <button id="btn-continue">↻ Continue</button>
      <button id="btn-retry">⟲ Retry</button>
      <button id="btn-erase">⌫ Erase</button>
    </div>
    <div class="modes">
      <button data-mode="do" class="on">Do</button>
      <button data-mode="say">Say</button>
      <button data-mode="story">Story</button>
    </div>
    <div class="composer">
      <textarea id="input" rows="1" placeholder="What do you do?"></textarea>
      <button id="send">Send</button>
    </div>
  </div>

  <script>
    const tg = window.Telegram ? window.Telegram.WebApp : null;
    if (tg) { tg.ready(); tg.expand(); }
    const INIT = tg ? tg.initData : "";
    const H = { "Content-Type": "application/json", "Authorization": "tma " + INIT };
    const PLACEHOLDERS = { do: "What do you do?", say: "What do you say?", story: "Write the next part of the story…" };

    const $ = (id) => document.getElementById(id);
    const main = $("main"), titleEl = $("title"), backEl = $("back"), dock = $("dock"), newBtn = $("newbtn");
    const input = $("input"), sendBtn = $("send");
    const esc = (s) => (s || "").replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
    let state = { view: "list", offset: 0, total: 0, limit: 20, id: null, title: "", mode: "do", busy: false };

    async function api(path, opts = {}) {
      const res = await fetch(path, { headers: H, ...opts });
      if (!res.ok) throw new Error("HTTP " + res.status);
      return res.json();
    }

    /* ---------- Adventure list ---------- */
    async function showList() {
      state.view = "list"; backEl.style.display = "none"; dock.classList.add("hidden");
      newBtn.classList.remove("hidden");
      titleEl.textContent = "Your Adventures";
      main.innerHTML = '<div class="empty">Loading…</div>';
      try {
        const data = await api(`/api/adventures?offset=${state.offset}&limit=${state.limit}`);
        state.total = data.total;
        if (!data.items.length) {
          main.innerHTML = '<div class="empty">No adventures yet.<br>Create one in the bot with <b>/adventure</b>.</div>';
          return;
        }
        let h = '<div class="list">';
        for (const a of data.items) {
          h += `<div class="adv" data-id="${a.id}">
            <div class="t">${esc(a.title)}</div>
            <div class="m"><span class="badge ${esc(a.status)}">${esc(a.status)}</span> &nbsp;#${a.id}</div></div>`;
        }
        const from = state.offset, to = state.offset + data.items.length;
        h += `<div class="pager">
          <button id="prev" ${from <= 0 ? "disabled" : ""}>‹ Newer</button>
          <span class="hint" style="font-size:13px;">${from + 1}–${to} of ${state.total}</span>
          <button id="next" ${to >= state.total ? "disabled" : ""}>Older ›</button></div></div>`;
        main.innerHTML = h;
        main.querySelectorAll(".adv").forEach(el => el.onclick = () => openStory(+el.dataset.id, el.querySelector(".t").textContent));
        if ($("prev")) $("prev").onclick = () => { state.offset = Math.max(0, state.offset - state.limit); showList(); };
        if ($("next")) $("next").onclick = () => { state.offset += state.limit; showList(); };
      } catch (e) {
        main.innerHTML = `<div class="empty">Couldn't load adventures.<br><span class="hint">${esc(e.message)}</span></div>`;
      }
    }

    /* ---------- Story view ---------- */
    function renderStory(msgs) {
      if (!msgs.length) {
        main.innerHTML = '<div class="story"><p class="hint" style="font-style:italic;">The page is blank. Make your first move below to begin the story.</p></div>';
        return;
      }
      let h = '<div class="story" id="story-body">';
      for (const m of msgs) {
        if (m.role === "user") {
          h += `<p class="action">${esc(m.content)}</p>`;
        } else if (m.role === "system") {
          continue;
        } else {
          h += `<p class="narrator">${esc(m.content)}</p>`;
        }
      }
      h += "</div>";
      main.innerHTML = h;
      main.scrollTop = main.scrollHeight;
    }

    async function loadStory() {
      try {
        const data = await api(`/api/adventures/${state.id}/messages?limit=200`);
        renderStory(data.messages);
      } catch (e) {
        main.innerHTML = `<div class="empty">Couldn't open adventure.<br><span class="hint">${esc(e.message)}</span></div>`;
      }
    }

    async function openStory(id, title) {
      state.view = "story"; state.id = id; state.title = title;
      backEl.style.display = "inline"; dock.classList.remove("hidden");
      newBtn.classList.add("hidden");
      titleEl.textContent = title;
      main.innerHTML = '<div class="empty">Loading…</div>';
      await loadStory();
    }

    /* ---------- Create adventure ---------- */
    function showCreate() {
      state.view = "create";
      backEl.style.display = "inline"; dock.classList.add("hidden"); newBtn.classList.add("hidden");
      titleEl.textContent = "New Adventure";
      main.innerHTML = `<div class="create">
        <label>Title</label>
        <input id="c-title" maxlength="80" placeholder="Name your adventure" />
        <label>Premise</label>
        <textarea id="c-premise" rows="4" placeholder="What's the setup? A haunted lighthouse, a heist gone wrong, a first date with a vampire…"></textarea>
        <label>You play as (optional)</label>
        <input id="c-role" maxlength="120" placeholder="e.g. a rookie detective" />
        <button class="go" id="c-go">Begin Adventure ›</button>
        <div class="status" id="c-status"></div>
      </div>`;
      $("c-go").onclick = createAdventure;
    }

    async function createAdventure() {
      const title = $("c-title").value.trim();
      const premise = $("c-premise").value.trim();
      const player_role = $("c-role").value.trim();
      if (!title && !premise) { $("c-status").textContent = "Add a title or a premise to begin."; return; }
      $("c-go").disabled = true;
      $("c-status").textContent = "Weaving the opening scene…";
      try {
        const data = await api("/api/adventures", { method: "POST", body: JSON.stringify({ title, premise, player_role }) });
        await openStory(data.id, data.title);
      } catch (e) {
        $("c-status").textContent = "⚠️ " + e.message;
        $("c-go").disabled = false;
      }
    }

    function showTyping() {
      const body = $("story-body") || main.querySelector(".story");
      if (!body) return;
      const t = document.createElement("p");
      t.className = "typing"; t.id = "typing"; t.textContent = "The story unfolds…";
      body.appendChild(t); main.scrollTop = main.scrollHeight;
    }

    async function act(fn) {
      if (state.busy) return;
      state.busy = true; setBusy(true); showTyping();
      try { await fn(); await loadStory(); }
      catch (e) { const t = $("typing"); if (t) t.textContent = "⚠️ " + e.message; }
      finally { state.busy = false; setBusy(false); }
    }
    function setBusy(b) {
      sendBtn.disabled = b;
      ["btn-continue", "btn-retry", "btn-erase"].forEach(id => $(id).disabled = b);
    }

    async function sendTurn() {
      const text = input.value.trim();
      if (!text) return;
      input.value = ""; input.style.height = "auto";
      const mode = state.mode;
      await act(() => api(`/api/adventures/${state.id}/turn`, { method: "POST", body: JSON.stringify({ text, mode }) }));
    }

    /* ---------- Wiring ---------- */
    backEl.onclick = showList;
    newBtn.onclick = showCreate;
    sendBtn.onclick = sendTurn;
    $("btn-continue").onclick = () => act(() => api(`/api/adventures/${state.id}/continue`, { method: "POST" }));
    $("btn-retry").onclick = () => act(() => api(`/api/adventures/${state.id}/retry`, { method: "POST" }));
    $("btn-erase").onclick = () => act(() => api(`/api/adventures/${state.id}/erase`, { method: "POST" }));
    document.querySelectorAll(".modes button").forEach(b => b.onclick = () => {
      state.mode = b.dataset.mode;
      document.querySelectorAll(".modes button").forEach(x => x.classList.toggle("on", x === b));
      input.placeholder = PLACEHOLDERS[state.mode];
    });
    input.addEventListener("input", () => { input.style.height = "auto"; input.style.height = Math.min(input.scrollHeight, 120) + "px"; });
    input.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendTurn(); } });

    showList();
  </script>
</body>
</html>
