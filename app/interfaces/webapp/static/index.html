<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Adventures</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #0f172a);
      --sec-bg: var(--tg-theme-secondary-bg-color, #111827);
      --text: var(--tg-theme-text-color, #e2e8f0);
      --hint: var(--tg-theme-hint-color, #94a3b8);
      --link: var(--tg-theme-link-color, #60a5fa);
      --btn: var(--tg-theme-button-color, #2563eb);
      --btn-text: var(--tg-theme-button-text-color, #ffffff);
      --border: rgba(148, 163, 184, 0.18);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 15px;
      display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    }
    header {
      padding: 12px 16px; font-weight: 700; font-size: 17px;
      border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px;
      flex: 0 0 auto;
    }
    header .back { color: var(--link); cursor: pointer; font-size: 15px; font-weight: 500; display: none; }
    header .title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    main { flex: 1 1 auto; overflow-y: auto; padding: 12px 14px; }
    .hint { color: var(--hint); font-size: 13px; }
    .empty { text-align: center; color: var(--hint); padding: 48px 20px; }

    /* Adventure list */
    .adv {
      background: var(--sec-bg); border: 1px solid var(--border); border-radius: 12px;
      padding: 14px; margin-bottom: 10px; cursor: pointer; transition: transform .05s ease;
    }
    .adv:active { transform: scale(0.99); }
    .adv .t { font-weight: 600; margin-bottom: 4px; }
    .adv .m { color: var(--hint); font-size: 12px; }
    .badge { font-size: 11px; padding: 1px 8px; border-radius: 999px; background: rgba(96,165,250,.15); color: var(--link); }
    .pager { display: flex; gap: 8px; justify-content: center; margin: 8px 0 4px; }
    .pager button { background: var(--sec-bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; }
    .pager button:disabled { opacity: .4; }

    /* Chat */
    .msg { margin-bottom: 12px; display: flex; }
    .msg .bubble { max-width: 82%; padding: 9px 12px; border-radius: 14px; white-space: pre-wrap; line-height: 1.5; word-break: break-word; }
    .msg.user { justify-content: flex-end; }
    .msg.user .bubble { background: var(--btn); color: var(--btn-text); border-bottom-right-radius: 4px; }
    .msg.narrator .bubble { background: var(--sec-bg); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .composer {
      flex: 0 0 auto; display: flex; gap: 8px; padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--border); background: var(--bg);
    }
    .composer textarea {
      flex: 1; resize: none; border: 1px solid var(--border); border-radius: 18px;
      padding: 9px 14px; background: var(--sec-bg); color: var(--text); font: inherit; max-height: 120px;
    }
    .composer button {
      border: none; border-radius: 18px; background: var(--btn); color: var(--btn-text);
      padding: 0 18px; font-weight: 600; min-width: 64px;
    }
    .composer button:disabled { opacity: .5; }
    .typing { color: var(--hint); font-style: italic; font-size: 13px; padding: 0 2px 8px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <header>
    <span class="back" id="back">‹ Back</span>
    <span class="title" id="title">Your Adventures</span>
  </header>
  <main id="main"><div class="empty">Loading…</div></main>
  <div class="composer hidden" id="composer">
    <textarea id="input" rows="1" placeholder="What do you do?"></textarea>
    <button id="send">Send</button>
  </div>

  <script>
    const tg = window.Telegram ? window.Telegram.WebApp : null;
    if (tg) { tg.ready(); tg.expand(); }
    const INIT = tg ? tg.initData : "";
    const H = { "Content-Type": "application/json", "Authorization": "tma " + INIT };

    const main = document.getElementById("main");
    const titleEl = document.getElementById("title");
    const backEl = document.getElementById("back");
    const composer = document.getElementById("composer");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");

    let state = { view: "list", offset: 0, total: 0, limit: 20, adventureId: null };

    const esc = (s) => (s || "").replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));

    async function api(path, opts = {}) {
      const res = await fetch(path, { headers: H, ...opts });
      if (!res.ok) throw new Error("HTTP " + res.status);
      return res.json();
    }

    async function showList() {
      state.view = "list";
      backEl.style.display = "none";
      composer.classList.add("hidden");
      titleEl.textContent = "Your Adventures";
      main.innerHTML = '<div class="empty">Loading…</div>';
      try {
        const data = await api(`/api/adventures?offset=${state.offset}&limit=${state.limit}`);
        state.total = data.total;
        if (!data.items.length) {
          main.innerHTML = '<div class="empty">No adventures yet.<br>Create one in the bot with /adventure.</div>';
          return;
        }
        let html = "";
        for (const a of data.items) {
          html += `<div class="adv" data-id="${a.id}">
            <div class="t">${esc(a.title)}</div>
            <div class="m"><span class="badge">${esc(a.status)}</span> &nbsp;#${a.id}</div>
          </div>`;
        }
        const from = state.offset, to = state.offset + data.items.length;
        html += `<div class="pager">
          <button id="prev" ${from <= 0 ? "disabled" : ""}>‹ Newer</button>
          <span class="hint" style="align-self:center;">${from + 1}–${to} of ${state.total}</span>
          <button id="next" ${to >= state.total ? "disabled" : ""}>Older ›</button>
        </div>`;
        main.innerHTML = html;
        main.querySelectorAll(".adv").forEach(el =>
          el.addEventListener("click", () => openAdventure(parseInt(el.dataset.id))));
        const prev = document.getElementById("prev"), next = document.getElementById("next");
        if (prev) prev.addEventListener("click", () => { state.offset = Math.max(0, state.offset - state.limit); showList(); });
        if (next) next.addEventListener("click", () => { state.offset += state.limit; showList(); });
      } catch (e) {
        main.innerHTML = `<div class="empty">Couldn't load adventures.<br><span class="hint">${esc(e.message)}</span></div>`;
      }
    }

    function renderMessages(msgs) {
      if (!msgs.length) { main.innerHTML = '<div class="empty hint">The story begins. Make your first move below.</div>'; return; }
      main.innerHTML = msgs.map(m => {
        const cls = (m.role === "user") ? "user" : "narrator";
        return `<div class="msg ${cls}"><div class="bubble">${esc(m.content)}</div></div>`;
      }).join("");
      main.scrollTop = main.scrollHeight;
    }

    async function openAdventure(id) {
      state.view = "chat"; state.adventureId = id;
      backEl.style.display = "inline";
      composer.classList.remove("hidden");
      main.innerHTML = '<div class="empty">Loading…</div>';
      try {
        const adv = await api(`/api/adventures/${id}`);
        titleEl.textContent = adv.title;
        const data = await api(`/api/adventures/${id}/messages?limit=100`);
        renderMessages(data.messages);
      } catch (e) {
        main.innerHTML = `<div class="empty">Couldn't open adventure.<br><span class="hint">${esc(e.message)}</span></div>`;
      }
    }

    function appendMsg(role, content) {
      if (main.querySelector(".empty")) main.innerHTML = "";
      const div = document.createElement("div");
      div.className = "msg " + (role === "user" ? "user" : "narrator");
      div.innerHTML = `<div class="bubble">${esc(content)}</div>`;
      main.appendChild(div);
      main.scrollTop = main.scrollHeight;
      return div;
    }

    async function sendTurn() {
      const text = input.value.trim();
      if (!text || state.view !== "chat") return;
      input.value = ""; input.style.height = "auto";
      sendBtn.disabled = true;
      appendMsg("user", text);
      const typing = document.createElement("div");
      typing.className = "typing"; typing.textContent = "The narrator is writing…";
      main.appendChild(typing); main.scrollTop = main.scrollHeight;
      try {
        const data = await api(`/api/adventures/${state.adventureId}/turn`, {
          method: "POST", body: JSON.stringify({ text })
        });
        typing.remove();
        appendMsg("narrator", data.reply);
      } catch (e) {
        typing.remove();
        appendMsg("narrator", "⚠️ Couldn't reach the story (" + e.message + ").");
      } finally {
        sendBtn.disabled = false;
      }
    }

    backEl.addEventListener("click", showList);
    sendBtn.addEventListener("click", sendTurn);
    input.addEventListener("input", () => { input.style.height = "auto"; input.style.height = Math.min(input.scrollHeight, 120) + "px"; });
    input.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendTurn(); } });

    showList();
  </script>
</body>
</html>
