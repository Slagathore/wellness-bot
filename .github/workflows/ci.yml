name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install "ruff==0.6.9" mypy

      - name: Ruff (blocking)
        run: ruff check app/ tests/

      # mypy is informational for now: the codebase is not yet type-clean, so a
      # failure here should not block CI. Drop continue-on-error once it is.
      - name: mypy (informational)
        continue-on-error: true
        run: mypy app/

  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run pytest
        run: pytest

      - name: Build Docker image
        uses: docker/setup-buildx-action@v3

      - name: Docker build
        run: docker build -t wellness-bot:ci .
